<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wissous Tennis Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo-circle">
        <img src="logo.png" alt="WTC" />
      </div>
      <h1 class="club-name">Wissous Tennis Club</h1>
      <p class="tagline">TENNIS / CONVIVIALITÉ / WISSOUS</p>
    </header>

    <!-- Liens principaux -->
    <main class="links">

      <!-- Laisser un avis Google — lien principal / QR Code -->
      <a href="LIEN_AVIS_GOOGLE" class="card card--featured" target="_blank" rel="noopener">
        <div class="card__content">
          <p class="card__label">Votre avis compte !</p>
          <h2 class="card__title">Laisser un avis</h2>
          <p class="card__sub">Ça nous aide vraiment ✨</p>
        </div>
        <div class="card__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <span class="card__arrow">→</span>
      </a>

      <!-- Réservation de terrain -->
      <a href="LIEN_RESERVATION" class="card" target="_blank" rel="noopener">
        <div class="card__thumb card__thumb--reservation"></div>
        <div class="card__content">
          <h2 class="card__title">Réserver un terrain</h2>
          <p class="card__sub">Disponibilités en ligne →</p>
        </div>
      </a>

      <!-- Inscription -->
      <a href="LIEN_INSCRIPTION" class="card" target="_blank" rel="noopener">
        <div class="card__thumb card__thumb--inscription"></div>
        <div class="card__content">
          <h2 class="card__title">S'inscrire au club</h2>
          <p class="card__sub">Rejoindre la plateforme →</p>
        </div>
      </a>

      <!-- Grille Instagram + Contact -->
      <div class="grid-two">
        <a href="LIEN_INSTAGRAM" class="card card--small" target="_blank" rel="noopener">
          <div class="card__icon-round">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </div>
          <h3 class="card__title">Instagram</h3>
          <p class="card__sub">@HANDLE_INSTAGRAM</p>
        </a>

        <a href="LIEN_CONTACT" class="card card--small" target="_blank" rel="noopener">
          <div class="card__icon-round">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h3 class="card__title">Contact</h3>
          <p class="card__sub">Nous écrire</p>
        </a>
      </div>

    </main>

    <footer class="footer">
      <p>© 2026 Wissous Tennis Club</p>
    </footer>
  </div>
</body>
</html>
